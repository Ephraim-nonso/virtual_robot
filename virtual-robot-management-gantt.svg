      .subtitle { font: 400 14px Inter, Arial, sans-serif; fill: #5f6b7a; }
      .section { font: 700 14px Inter, Arial, sans-serif; fill: #0a1325; }
      .label { font: 500 13px Inter, Arial, sans-serif; fill: #0a1325; }
      .tick { font: 500 11px Inter, Arial, sans-serif; fill: #64748b; text-anchor: middle; }
      .grid { stroke: #e5e7eb; stroke-width: 1; }
      .grid-strong { stroke: #cbd5e1; stroke-width: 1.25; }
      .section-bg { fill: #f8fcff; }
      .section-line { stroke: #dbe5ea; stroke-width: 1; }
      .done { fill: #7dd3fc; stroke: #0a1325; stroke-width: 1.25; rx: 10; ry: 10; }
      .active { fill: #0a1325; stroke: #0a1325; stroke-width: 1.25; rx: 10; ry: 10; }
      .milestone { fill: #4bcde9; stroke: #0a1325; stroke-width: 1.25; }
      .bar-text { font: 600 11px Inter, Arial, sans-serif; fill: #0a1325; }
      .bar-text-light { font: 600 11px Inter, Arial, sans-serif; fill: #ffffff; }
    </style>
  </defs>

